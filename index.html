<!DOCTYPE html>
<html>
<head>
    <title>Anime Stream - Student Project</title>
    <link rel="stylesheet" href="style.css">
    <!-- link to fontawesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
    <!-- Navbar section -->
    <div id="navbar">
        <h2 id="logo">AnimeFlix</h2>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">Movies</a>
            <a href="#">TV</a>
            <a href="#" style="color: red;">Anime</a>
        </div>
        <div class="user-stuff">
            <i class="fas fa-search"></i>
            <button id="loginBtn">Login</button>
        </div>
    </div>

    <!-- big banner image -->
    <div class="hero">
        <div class="dark-background">
            <h1 class="title-text">BLEACH</h1>
            <p>Action | Supernatural | Shonen</p>
            <p style="width: 50%;">High school student Ichigo Kurosaki gains soul reaper powers from Rukia Kuchiki and sets out to save the world.</p>
            <br>
            <button class="play-button"><i class="fas fa-play"></i> Watch Now</button>
            <button class="info-button">More Info</button>
        </div>
    </div>

    <!-- anime rows -->
    <div class="main-body">
        
        <h3 id="loadingText">Loading animes... please wait</h3>

        <div id="all-rows" style="display: none;">
            <!-- trending row -->
            <h2>Trending Now</h2>
            <div class="row" id="row1"></div>

            <!-- popular row -->
            <h2>Most Popular</h2>
            <div class="row" id="row2"></div>

            <!-- top rated row -->
            <h2>Highest Rated</h2>
            <div class="row" id="row3"></div>
        </div>

    </div>

    <!-- javascript link -->
    <script src="script.js"></script>
</body>
</html>
